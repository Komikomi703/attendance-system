<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>千葉工業大学 出席管理</title>

<style>
:root{
    --bg:#dff7ff;
    --text:#172033;
    --muted:#607080;
    --blue:#1d4ed8;
    --green:#16a34a;
    --amber:#f59e0b;
    --red:#dc2626;
    --line:#d9e4ee;
    --glass:rgba(255,255,255,0.9);
}

*{
    box-sizing:border-box;
}

body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:
        linear-gradient(180deg,rgba(14,165,233,0.24),rgba(240,253,250,0.96)),
        var(--bg);
    color:var(--text);
    margin:0;
    min-height:100vh;
}

.app{
    max-width:840px;
    margin:0 auto;
    padding:18px;
}

.hero{
    position:relative;
    min-height:310px;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
    background-image:
        linear-gradient(90deg,rgba(7,16,35,0.72),rgba(7,16,35,0.24),rgba(255,255,255,0.08)),
        url("beach.png");
    background-size:cover;
    background-position:center;
    box-shadow:0 14px 34px rgba(15,23,42,0.18);
}

.hero::after{
    content:"";
    position:absolute;
    inset:auto 0 0;
    height:100px;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(223,247,255,0.92));
}

.header{
    position:relative;
    z-index:2;
    max-width:430px;
    padding:28px;
    color:white;
}

h1{
    margin:0 0 12px;
    font-size:32px;
}

#clock{
    font-size:28px;
    font-weight:800;
}

#today{
    color:#dbeafe;
    margin-top:8px;
    font-size:15px;
}

.creature-layer{
    position:absolute;
    inset:0;
    z-index:1;
    pointer-events:none;
}

.creature{
    position:absolute;
    display:grid;
    place-items:center;
    width:54px;
    height:54px;
    border-radius:50%;
    background:rgba(255,255,255,0.72);
    box-shadow:0 8px 20px rgba(15,23,42,0.14);
    font-size:31px;
    animation:float 4s ease-in-out infinite;
}

.penguin{ right:34px; bottom:34px; }
.dolphin{ right:138px; top:42px; animation-delay:0.7s; }
.fish{ left:48%; bottom:54px; animation-delay:1.1s; }
.turtle{ left:34px; bottom:32px; animation-delay:1.5s; }
.jelly{ right:230px; bottom:104px; animation-delay:2s; }

.bubble{
    position:absolute;
    width:14px;
    height:14px;
    border:2px solid rgba(255,255,255,0.72);
    border-radius:50%;
    animation:rise 5s ease-in-out infinite;
}

.bubble.one{ right:100px; bottom:42px; }
.bubble.two{ right:192px; bottom:72px; width:10px; height:10px; animation-delay:1.3s; }
.bubble.three{ left:42%; bottom:76px; width:18px; height:18px; animation-delay:2.2s; }

#schedule{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.card{
    position:relative;
    background:var(--glass);
    border:1px solid var(--line);
    border-radius:8px;
    padding:15px;
    box-shadow:0 5px 16px rgba(15,23,42,0.08);
    overflow:hidden;
    backdrop-filter:blur(8px);
}

.card::before{
    content:"";
    position:absolute;
    inset:0 auto 0 0;
    width:7px;
    background:#94a3b8;
}

.card.current{
    padding:24px;
    border:2px solid var(--green);
    background:rgba(255,255,255,0.96);
    box-shadow:0 14px 30px rgba(22,163,74,0.24);
    transform:scale(1.01);
}

.card.current::before{ background:var(--green); }
.card.ready{ border-color:#93c5fd; background:rgba(239,246,255,0.95); }
.card.ready::before{ background:var(--blue); }
.card.next{ background:rgba(255,251,235,0.92); }
.card.next::before{ background:var(--amber); }
.card.ended{ opacity:0.58; box-shadow:none; }

.top-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
}

.label{
    display:inline-flex;
    align-items:center;
    border-radius:999px;
    padding:5px 10px;
    font-size:13px;
    font-weight:800;
    white-space:nowrap;
    color:white;
    background:#64748b;
}

.label.current{ background:var(--green); }
.label.ready{ background:var(--blue); }
.label.next{ background:var(--amber); }
.label.ended{ background:var(--red); }

.subject{
    font-size:19px;
    font-weight:800;
    line-height:1.35;
    margin-bottom:8px;
}

.card.current .subject{
    font-size:27px;
}

.main-info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin:12px 0;
}

.info-box{
    background:rgba(248,250,252,0.96);
    border:1px solid rgba(226,232,240,0.9);
    border-radius:8px;
    padding:10px;
}

.info-title{
    color:var(--muted);
    font-size:12px;
    margin-bottom:4px;
}

.info-value{
    font-size:17px;
    font-weight:800;
}

.card.current .info-value{
    font-size:20px;
}

.status{
    font-weight:800;
    margin:10px 0;
    font-size:15px;
}

.status.current{ color:var(--green); }
.status.ready{ color:var(--blue); }
.status.next{ color:#b45309; }
.status.ended{ color:var(--red); }

.progress{
    height:8px;
    background:#e5e7eb;
    border-radius:999px;
    overflow:hidden;
    margin:10px 0 14px;
    display:none;
}

.card.current .progress,
.card.ready .progress{
    display:block;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#06b6d4);
    border-radius:999px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
}

.active-btn{
    background:linear-gradient(90deg,#16a34a,#0891b2);
    color:white;
    box-shadow:0 8px 16px rgba(22,163,74,0.23);
}

.ready-btn{
    background:var(--blue);
    color:white;
}

.disabled-btn{
    background:#e5e7eb;
    color:#6b7280;
    cursor:not-allowed;
}

.empty{
    text-align:center;
    color:var(--muted);
}

@keyframes float{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-12px) rotate(3deg); }
}

@keyframes rise{
    0%{ transform:translateY(0) scale(0.9); opacity:0.25; }
    50%{ opacity:1; }
    100%{ transform:translateY(-70px) scale(1.18); opacity:0; }
}

@media (max-width:620px){
    .app{ padding:12px; }
    .hero{ min-height:260px; border-radius:14px; }
    .header{ padding:22px; }
    h1{ font-size:27px; }
    #clock{ font-size:24px; }

    .creature{
        width:42px;
        height:42px;
        font-size:25px;
    }

    .dolphin{ right:86px; top:28px; }
    .fish{ left:48%; bottom:46px; }
    .jelly{ right:150px; bottom:90px; }
    .turtle{ left:18px; }

    .main-info{ grid-template-columns:1fr; }

    .top-row{
        flex-direction:column-reverse;
        align-items:flex-start;
    }

    .card.current{
        transform:none;
    }

    .card.current .subject{
        font-size:23px;
    }
}
</style>
</head>

<body>
<main class="app">
    <section class="hero">
        <div class="creature-layer" aria-hidden="true">
            <div class="creature penguin">🐧</div>
            <div class="creature dolphin">🐬</div>
            <div class="creature fish">🐠</div>
            <div class="creature turtle">🐢</div>
            <div class="creature jelly">🪼</div>
            <div class="bubble one"></div>
            <div class="bubble two"></div>
            <div class="bubble three"></div>
        </div>

        <section class="header">
            <h1>出席システム</h1>
            <div id="clock"></div>
            <div id="today"></div>
        </section>
    </section>

    <section id="schedule"></section>
</main>

<script>
const baseUrl = "https://attendance.is.it-chiba.ac.jp/attendance/class_room/";

const timetable = {
    1:[
        { subject:"情報メディア基礎", room:"5103", start:"10:00", end:"12:00" },
        { subject:"NWプログラミング基礎演習", room:"3212", start:"13:00", end:"17:00" }
    ],
    2:[
        { subject:"TCP/IP概論", room:"8102", start:"09:00", end:"10:00" },
        { subject:"英語理解 3f", room:"5205", start:"10:00", end:"12:00" },
        { subject:"微分方程式", room:"8206", start:"13:00", end:"15:00" }
    ],
    3:[
        { subject:"データ構造とアルゴリズム", room:"3212", start:"10:00", end:"12:00" },
        { subject:"確率統計", room:"8109", start:"13:00", end:"15:00" },
        { subject:"数理モデリング", room:"8201", start:"15:00", end:"17:00" }
    ],
    4:[
        { subject:"情報数学1", room:"7202", start:"10:00", end:"12:00" }
    ],
    5:[
        { subject:"キャリアデザイン", room:"11号館2階演習室2", start:"10:00", end:"12:00" },
        { subject:"英語表現", room:"5304", start:"13:00", end:"15:00" },
        { subject:"倫理学", room:"5102", start:"15:00", end:"17:00" }
    ]
};

const dayNames = ["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];

function updateClock(){
    const now = new Date();

    document.getElementById("clock").innerText =
        now.toLocaleTimeString("ja-JP",{
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        });

    document.getElementById("today").innerText =
        now.toLocaleDateString("ja-JP") + " " + dayNames[now.getDay()];
}

function timeToMinutes(timeStr){
    const [h,m] = timeStr.split(":").map(Number);
    return h * 60 + m;
}

function minutesText(minutes){
    if(minutes <= 0){
        return "まもなく";
    }

    const h = Math.floor(minutes / 60);
    const m = minutes % 60;

    if(h === 0){
        return m + "分";
    }

    if(m === 0){
        return h + "時間";
    }

    return h + "時間" + m + "分";
}

function getClassState(cls,currentMinutes){
    const start = timeToMinutes(cls.start);
    const end = timeToMinutes(cls.end);
    const openTime = start - 30;

    if(currentMinutes >= start && currentMinutes <= end){
        return {
            type:"current",
            label:"今受ける授業",
            status:"出席可能・終了まで " + minutesText(end - currentMinutes),
            buttonText:"出席する",
            disabled:false,
            progress:((currentMinutes - start) / (end - start)) * 100
        };
    }

    if(currentMinutes >= openTime && currentMinutes < start){
        return {
            type:"ready",
            label:"受付中",
            status:"授業開始まで " + minutesText(start - currentMinutes),
            buttonText:"今のうちに出席する",
            disabled:false,
            progress:((currentMinutes - openTime) / 30) * 100
        };
    }

    if(currentMinutes < openTime){
        return {
            type:"next",
            label:"受付前",
            status:"受付開始まで " + minutesText(openTime - currentMinutes),
            buttonText:"まだ出席できません",
            disabled:true,
            progress:0
        };
    }

    return {
        type:"ended",
        label:"終了",
        status:"授業は終了しました",
        buttonText:"受付終了",
        disabled:true,
        progress:100
    };
}

function renderSchedule(){
    const now = new Date();
    const day = now.getDay();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    const container = document.getElementById("schedule");
    const todayClasses = timetable[day];

    container.innerHTML = "";

    if(!todayClasses){
        container.innerHTML = "<div class='card empty'>今日は授業なし</div>";
        return;
    }

    todayClasses.forEach(cls => {
        const state = getClassState(cls,currentMinutes);
        const url = baseUrl + encodeURIComponent(cls.room);
        const card = document.createElement("article");

        card.className = "card " + state.type;

        card.innerHTML = `
            <div class="top-row">
                <div>
                    <div class="subject">${cls.subject}</div>
                    <div class="status ${state.type}">${state.status}</div>
                </div>
                <div class="label ${state.type}">${state.label}</div>
            </div>

            <div class="main-info">
                <div class="info-box">
                    <div class="info-title">時間</div>
                    <div class="info-value">${cls.start} - ${cls.end}</div>
                </div>

                <div class="info-box">
                    <div class="info-title">教室</div>
                    <div class="info-value">${cls.room}</div>
                </div>
            </div>

            <div class="progress">
                <div class="progress-bar" style="width:${Math.min(state.progress,100)}%"></div>
            </div>

            <button
                class="${state.type === "current" ? "active-btn" : state.type === "ready" ? "ready-btn" : "disabled-btn"}"
                ${state.disabled ? "disabled" : ""}
            >
                ${state.buttonText}
            </button>
        `;

        const button = card.querySelector("button");

        if(!state.disabled){
            button.addEventListener("click",() => {
                window.open(url,"_blank");
            });
        }

        container.appendChild(card);
    });
}

function update(){
    updateClock();
    renderSchedule();
}

update();
setInterval(update,1000);
</script>
</body>
</html>
